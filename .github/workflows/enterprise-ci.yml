name: Enterprise CI Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - 'helm/**'
      - 'environments/**'
      - '.github/workflows/enterprise-ci.yml'


  pull_request:
    branches:
      - main
    paths:
      - 'terraform/**'
      - 'helm/**'
      - 'environments/**'
      - '.github/workflows/enterprise-ci.yml'

jobs:


   detect-changes:
    runs-on: ubuntu-latest

    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
      helm: ${{ steps.filter.outputs.helm }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Detect Changed Paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            terraform:
              - 'terraform/**'
            helm:
              - 'helm/**'
              - 'environments/**'

   terraform-validation:

    
    
     needs: detect-changes
     if: needs.detect-changes.outputs.terraform == 'true'
     runs-on: ubuntu-latest   
     
     
     strategy:
       fail-fast: false
       matrix:
        environment:
        - dev
        - qa
        - prod

     defaults:
      run:
        working-directory: terraform/environments/${{ matrix.environment }}

     steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Verify Terraform Version
        run: terraform version

      
      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Initialize
        run: terraform init

      - name: Terraform Validate
        run: terraform validate



   helm-validation:

    needs:
      - detect-changes
      - terraform-validation

    if: |
      always() &&
      needs.detect-changes.outputs.helm == 'true' &&
      (needs.terraform-validation.result == 'success' ||
       needs.terraform-validation.result == 'skipped')

    runs-on: ubuntu-latest

    strategy:
      matrix:
        environment:
          - dev
          - qa
          - prod

    env:
      CHART_PATH: ./helm/rajesh-web
      VALUES_FILE: ./environments/${{ matrix.environment }}/rajesh-web-values.yaml
      RELEASE_NAME: rajesh-${{ matrix.environment }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Verify Helm Installation
        run: helm version

      - name: Helm Lint
        run: helm lint $CHART_PATH

      - name: Helm Template
        run: |
          helm template $RELEASE_NAME \
            $CHART_PATH \
            -f $VALUES_FILE